<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Brand Lift & Multicell</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; min-height: 100vh; padding: 24px; }
  h1 { font-size: 22px; font-weight: 800; color: #1e293b; }
  .sub { color: #64748b; font-size: 13px; margin-top: 4px; }
  .header { margin-bottom: 24px; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 18px 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); border-left: 4px solid var(--c); min-width: 130px; }
  .stat-val { font-size: 26px; font-weight: 800; color: #1e293b; }
  .stat-label { font-size: 13px; font-weight: 600; color: #475569; margin-top: 2px; }
  .stat-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { padding: 7px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; border: 1px solid #e2e8f0; background: #fff; color: #475569; }
  .tab.active { background: #6366f1; color: #fff; border-color: #6366f1; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .filters label { font-size: 12px; color: #64748b; font-weight: 600; }
  .filters select { padding: 5px 10px; border-radius: 7px; border: 1px solid #e2e8f0; font-size: 12px; background: #fff; color: #1e293b; }
  .count { font-size: 12px; color: #94a3b8; }
  .panel { display: none; }
  .panel.active { display: block; }
  /* Gantt */
  .gantt-wrap { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow-x: auto; }
  .gantt-head { display: grid; grid-template-columns: 260px 90px 90px 1fr; border-bottom: 2px solid #f1f5f9; position: sticky; top: 0; background: #fff; z-index: 2; }
  .gantt-head-cell { padding: 10px 16px; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
  .gantt-months { display: flex; padding: 10px 0; }
  .gantt-month { flex: 1; font-size: 11px; font-weight: 600; color: #94a3b8; text-align: center; border-left: 1px solid #f1f5f9; }
  .gantt-row { display: grid; grid-template-columns: 260px 90px 90px 1fr; border-bottom: 1px solid #f8fafc; }
  .gantt-row:nth-child(even) { background: #fafafa; }
  .gantt-row:hover { background: #f0f4ff; }
  .gantt-cell { padding: 8px 16px; display: flex; align-items: center; }
  .marca-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 6px; }
  .marca-name { font-size: 12px; font-weight: 700; color: #1e293b; }
  .camp-name { font-size: 11px; color: #64748b; margin-left: 14px; }
  .badge { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-tipo { font-size: 11px; color: #6366f1; font-weight: 600; background: #eef2ff; padding: 2px 7px; border-radius: 99px; }
  .gantt-bar-wrap { position: relative; height: 44px; display: flex; align-items: center; }
  .gantt-gridline { position: absolute; top: 0; bottom: 0; border-left: 1px solid #f1f5f9; }
  .gantt-bar { position: absolute; height: 20px; border-radius: 6px; opacity: 0.85; display: flex; align-items: center; padding-left: 6px; overflow: hidden; }
  .gantt-bar span { font-size: 10px; color: #fff; font-weight: 700; white-space: nowrap; }
  /* Resumen */
  .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .card h3 { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 16px; }
  .bar-row { margin-bottom: 12px; }
  .bar-row-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .bar-label { font-size: 13px; font-weight: 600; color: #1e293b; display: flex; align-items: center; gap: 7px; }
  .bar-val { font-size: 13px; color: #64748b; }
  .bar-track { background: #f1f5f9; border-radius: 99px; height: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; }
  .col-chart { display: flex; align-items: flex-end; gap: 10px; height: 110px; }
  .col-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .col-num { font-size: 11px; font-weight: 700; color: #6366f1; }
  .col-bar { width: 100%; background: #6366f1; border-radius: 4px 4px 0 0; opacity: 0.8; }
  .col-lbl { font-size: 10px; color: #94a3b8; }
  .full-width { grid-column: 1 / -1; }
  /* Tabla */
  .table-wrap { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
  th { padding: 10px 14px; text-align: left; font-weight: 700; color: #64748b; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f1f5f9; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #f0f4ff; }
  td { padding: 9px 14px; color: #475569; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Dashboard Brand Lift & Multicell</h1>
  <p class="sub" id="sub-count"></p>
</div>

<div class="stats" id="stats"></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('gantt')">🗓 Gantt</button>
  <button class="tab" onclick="switchTab('resumen')">📈 Resumen</button>
  <button class="tab" onclick="switchTab('tabla')">📋 Tabla</button>
</div>

<div class="filters">
  <label>Marca:</label>
  <select id="f-marca" onchange="render()"></select>
  <label>Estado:</label>
  <select id="f-estado" onchange="render()"></select>
  <label>Tipo:</label>
  <select id="f-tipo" onchange="render()"></select>
  <span class="count" id="f-count"></span>
</div>

<div id="panel-gantt" class="panel active"></div>
<div id="panel-resumen" class="panel"></div>
<div id="panel-tabla" class="panel"></div>

<script>
const DATA = [
  {marca:"Brahma",campana:"Verano",tipo:"Brand Lift",plataforma:"Meta",objetivo:"Awareness + Producto + Concepto SED",portfolio:"Defend Core",estado:"Done",inicio:"2025-12-01",fin:"2026-02-28",presupuesto:null},
  {marca:"Brahma",campana:"Verano",tipo:"Brand Lift",plataforma:"TikTok",objetivo:"Awareness + Producto + Concepto SED",portfolio:"Defend Core",estado:"Done",inicio:"2025-12-01",fin:"2026-01-31",presupuesto:null},
  {marca:"Corona",campana:"Lollapalooza",tipo:"Brand Lift",plataforma:"TikTok",objetivo:"Fuerza en tiktok + awareness + target 18-24",portfolio:"Reignite Category",estado:"In Progress",inicio:"2026-03-01",fin:"2026-03-31",presupuesto:null},
  {marca:"Stella Artois",campana:"Perfect Serve: Roland Garros",tipo:"Brand Lift",plataforma:"Meta",objetivo:"Asociación de marca con Tenis (Hombres 25-34)",portfolio:"Grow Premium",estado:"Set Up",inicio:"2026-03-01",fin:"2026-03-31",presupuesto:null},
  {marca:"Quilmes",campana:"Promo Mundial",tipo:"Brand Lift",plataforma:"Meta",objetivo:"Consideración",portfolio:"Defend Core",estado:"Set Up",inicio:"2026-03-01",fin:"2026-03-31",presupuesto:28.5},
  {marca:"Quilmes",campana:"Promo Mundial",tipo:"Brand Lift",plataforma:"TikTok",objetivo:"Consideración",portfolio:"Defend Core",estado:"Set Up",inicio:"2026-03-01",fin:"2026-03-31",presupuesto:37},
  {marca:"Quilmes",campana:"Promo Mundial",tipo:"Brand Lift",plataforma:"Youtube",objetivo:"Consideración",portfolio:"Defend Core",estado:"Set Up",inicio:"2026-03-01",fin:"2026-03-31",presupuesto:65.7},
  {marca:"Quilmes",campana:"Promo Mundial",tipo:"Brand Lift",plataforma:"X",objetivo:"Consideración",portfolio:"Defend Core",estado:"Set Up",inicio:"2026-03-01",fin:"2026-03-31",presupuesto:39},
  {marca:"Michelob Ultra",campana:"Mundial",tipo:"Brand Lift",plataforma:"Youtube",objetivo:"TBD (asociar la marca con el mundial + top of mind)",portfolio:"Grow Premium",estado:"Not Started",inicio:"2026-04-01",fin:"2026-07-31",presupuesto:119},
  {marca:"Michelob Ultra",campana:"Mundial",tipo:"Brand Lift",plataforma:"X",objetivo:"TBD",portfolio:"Grow Premium",estado:"Not Started",inicio:"2026-04-01",fin:"2026-07-31",presupuesto:26},
  {marca:"Michelob Ultra",campana:"Mundial",tipo:"Multicell",plataforma:"Meta",objetivo:"TBD",portfolio:"Grow Premium",estado:"Not Started",inicio:"2026-04-01",fin:"2026-07-31",presupuesto:140},
  {marca:"Michelob Ultra",campana:"Mundial",tipo:"Multicell",plataforma:"TikTok",objetivo:"TBD",portfolio:"Grow Premium",estado:"Not Started",inicio:"2026-04-01",fin:"2026-07-31",presupuesto:100},
  {marca:"Budweiser",campana:"Tomorrowland",tipo:"Brand Lift",plataforma:"Meta",objetivo:"Awareness + Consideración (sorteo para viajar al evento)",portfolio:"Reignite Category",estado:"Not Started",inicio:"2026-04-01",fin:"2026-06-30",presupuesto:162},
  {marca:"Budweiser",campana:"Tomorrowland",tipo:"Multicell",plataforma:"Meta",objetivo:"Awareness + Consideración (sorteo para viajar al evento)",portfolio:"Reignite Category",estado:"Not Started",inicio:"2026-04-01",fin:"2026-06-30",presupuesto:11.5},
  {marca:"Corona",campana:"Cero",tipo:"Brand Lift",plataforma:"Meta",objetivo:"Ocasión de consumo - almuerzos",portfolio:"Occasions",estado:"Not Started",inicio:"2026-05-01",fin:"2026-08-31",presupuesto:55},
  {marca:"Corona",campana:"Cero",tipo:"Multicell",plataforma:"Meta",objetivo:"Ocasión de consumo - almuerzos",portfolio:"Occasions",estado:"Not Started",inicio:"2026-05-01",fin:"2026-08-31",presupuesto:55},
  {marca:"Quilmes",campana:"Mundial",tipo:"Brand Lift",plataforma:"Meta",objetivo:"Brand Favorability",portfolio:"Defend Core",estado:"Not Started",inicio:"2026-05-01",fin:"2026-07-31",presupuesto:16.8},
  {marca:"Quilmes",campana:"Mundial",tipo:"Brand Lift",plataforma:"TikTok",objetivo:"Brand Favorability",portfolio:"Defend Core",estado:"Not Started",inicio:"2026-05-01",fin:"2026-07-31",presupuesto:14},
  {marca:"Quilmes",campana:"Mundial",tipo:"Brand Lift",plataforma:"X",objetivo:"Brand Favorability",portfolio:"Defend Core",estado:"Not Started",inicio:"2026-05-01",fin:"2026-07-31",presupuesto:91},
];

const ESTADO_COLOR = {
  "Done": {bg:"#dcfce7",text:"#166534",bar:"#22c55e"},
  "In Progress": {bg:"#dbeafe",text:"#1e40af",bar:"#3b82f6"},
  "Set Up": {bg:"#fef9c3",text:"#854d0e",bar:"#eab308"},
  "Not Started": {bg:"#f3f4f6",text:"#6b7280",bar:"#d1d5db"},
};
const MARCA_COLOR = {
  "Brahma":"#f97316","Corona":"#eab308","Stella Artois":"#8b5cf6",
  "Quilmes":"#3b82f6","Michelob Ultra":"#06b6d4","Budweiser":"#ef4444"
};
const MONTHS = ["dic-25","ene-26","feb-26","mar-26","abr-26","may-26","jun-26","jul-26","ago-26"];
const MONTH_DATES = {"dic-25":"2025-12-01","ene-26":"2026-01-01","feb-26":"2026-02-01","mar-26":"2026-03-01","abr-26":"2026-04-01","may-26":"2026-05-01","jun-26":"2026-06-01","jul-26":"2026-07-01","ago-26":"2026-08-01"};
const GANTT_START = new Date("2025-12-01");
const GANTT_END = new Date("2026-08-31");
const TOTAL_DAYS = (GANTT_END - GANTT_START) / 86400000;

function dayOff(d){ return Math.max(0,(new Date(d)-GANTT_START)/86400000); }
function badge(e){ const c=ESTADO_COLOR[e]||ESTADO_COLOR["Not Started"]; return `<span class="badge" style="background:${c.bg};color:${c.text}">${e}</span>`; }

let currentTab = "gantt";
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['gantt','resumen','tabla'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  render();
}

function getFiltered(){
  const m=document.getElementById('f-marca').value;
  const e=document.getElementById('f-estado').value;
  const t=document.getElementById('f-tipo').value;
  return DATA.filter(d=>
    (m==="Todas"||d.marca===m)&&
    (e==="Todos"||d.estado===e)&&
    (t==="Todos"||d.tipo===t)
  );
}

function initFilters(){
  const marcas=["Todas",...new Set(DATA.map(d=>d.marca))];
  const estados=["Todos","Done","In Progress","Set Up","Not Started"];
  const tipos=["Todos","Brand Lift","Multicell"];
  document.getElementById('f-marca').innerHTML=marcas.map(m=>`<option>${m}</option>`).join('');
  document.getElementById('f-estado').innerHTML=estados.map(e=>`<option>${e}</option>`).join('');
  document.getElementById('f-tipo').innerHTML=tipos.map(t=>`<option>${t}</option>`).join('');
}

function renderStats(){
  const total=DATA.length;
  const presup=DATA.reduce((s,d)=>s+(d.presupuesto||0),0);
  const counts={Done:0,"In Progress":0,"Set Up":0,"Not Started":0};
  DATA.forEach(d=>counts[d.estado]=(counts[d.estado]||0)+1);
  const cards=[
    {label:"Total estudios",val:total,c:"#6366f1"},
    {label:"Done",val:counts["Done"],c:"#22c55e"},
    {label:"In Progress",val:counts["In Progress"],c:"#3b82f6"},
    {label:"Set Up",val:counts["Set Up"],c:"#eab308"},
    {label:"Not Started",val:counts["Not Started"],c:"#d1d5db"},
    {label:"Presupuesto total",val:`$${presup.toFixed(1)}M`,c:"#f97316",sub:"solo estudios con dato"},
  ];
  document.getElementById('stats').innerHTML=cards.map(c=>`
    <div class="stat-card" style="--c:${c.c}">
      <div class="stat-val">${c.val}</div>
      <div class="stat-label">${c.label}</div>
      ${c.sub?`<div class="stat-sub">${c.sub}</div>`:''}
    </div>`).join('');
  document.getElementById('sub-count').textContent=`${total} estudios · dic 2025 – ago 2026`;
}

function renderGantt(filtered){
  const months_html=MONTHS.map(m=>`<div class="gantt-month">${m}</div>`).join('');
  const rows=filtered.map((d,i)=>{
    const start=dayOff(d.inicio), end=dayOff(d.fin);
    const left=(start/TOTAL_DAYS)*100;
    const width=Math.max(((end-start)/TOTAL_DAYS)*100,1.2);
    const c=ESTADO_COLOR[d.estado]||ESTADO_COLOR["Not Started"];
    const mc=MARCA_COLOR[d.marca]||"#6366f1";
    const gridlines=MONTHS.map((_,mi)=>`<div class="gantt-gridline" style="left:${(mi/MONTHS.length)*100}%"></div>`).join('');
    return `<div class="gantt-row">
      <div class="gantt-cell" style="flex-direction:column;align-items:flex-start;gap:2px">
        <div style="display:flex;align-items:center">
          <div class="marca-dot" style="background:${mc}"></div>
          <span class="marca-name">${d.marca}</span>
        </div>
        <span class="camp-name">${d.campana} · ${d.plataforma}</span>
      </div>
      <div class="gantt-cell">${badge(d.estado)}</div>
      <div class="gantt-cell"><span class="badge-tipo">${d.tipo}</span></div>
      <div class="gantt-bar-wrap">
        ${gridlines}
        <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${c.bar}" title="${d.campana} · ${d.objetivo}">
          <span>${d.presupuesto?'$'+d.presupuesto+'M':''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('panel-gantt').innerHTML=`
    <div class="gantt-wrap" style="min-width:700px">
      <div class="gantt-head">
        <div class="gantt-head-cell">Proyecto</div>
        <div class="gantt-head-cell">Estado</div>
        <div class="gantt-head-cell">Tipo</div>
        <div class="gantt-months">${months_html}</div>
      </div>
      ${rows}
    </div>`;
}

function renderResumen(){
  const porMarca={};
  DATA.forEach(d=>{
    if(!porMarca[d.marca]) porMarca[d.marca]={total:0,presupuesto:0};
    porMarca[d.marca].total++;
    porMarca[d.marca].presupuesto+=d.presupuesto||0;
  });
  const marcaRows=Object.entries(porMarca).map(([m,v])=>`
    <div class="bar-row">
      <div class="bar-row-top">
        <span class="bar-label"><span style="width:10px;height:10px;border-radius:50%;background:${MARCA_COLOR[m]||'#6366f1'};display:inline-block"></span>${m}</span>
        <span class="bar-val">${v.total} estudios${v.presupuesto>0?' · $'+v.presupuesto.toFixed(1)+'M':''}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v.total/DATA.length)*100}%;background:${MARCA_COLOR[m]||'#6366f1'}"></div></div>
    </div>`).join('');

  const plats=["Meta","TikTok","Youtube","X"];
  const platColors={"Meta":"#1877f2","TikTok":"#010101","Youtube":"#ff0000","X":"#000"};
  const platRows=plats.map(p=>{
    const n=DATA.filter(d=>d.plataforma===p).length;
    return `<div class="bar-row">
      <div class="bar-row-top"><span class="bar-label">${p}</span><span class="bar-val">${n} estudios</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(n/DATA.length)*100}%;background:${platColors[p]||'#6366f1'}"></div></div>
    </div>`;
  }).join('');

  const ports=[...new Set(DATA.map(d=>d.portfolio))];
  const portCols=["#6366f1","#f97316","#22c55e","#ec4899"];
  const portRows=ports.map((p,i)=>{
    const n=DATA.filter(d=>d.portfolio===p).length;
    return `<div class="bar-row">
      <div class="bar-row-top"><span class="bar-label">${p}</span><span class="bar-val">${n} estudios</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(n/DATA.length)*100}%;background:${portCols[i%portCols.length]}"></div></div>
    </div>`;
  }).join('');

  const maxN=12;
  const colCols=MONTHS.map(m=>{
    const mDate=new Date(MONTH_DATES[m]);
    const mEnd=new Date(mDate.getFullYear(),mDate.getMonth()+1,0);
    const n=DATA.filter(d=>new Date(d.inicio)<=mEnd&&new Date(d.fin)>=mDate).length;
    const h=Math.max((n/maxN)*80,2);
    return `<div class="col-item"><span class="col-num">${n}</span><div class="col-bar" style="height:${h}px"></div><span class="col-lbl">${m}</span></div>`;
  }).join('');

  document.getElementById('panel-resumen').innerHTML=`
    <div class="resumen-grid">
      <div class="card"><h3>Estudios por Marca</h3>${marcaRows}</div>
      <div class="card"><h3>Estudios por Plataforma</h3>${platRows}</div>
      <div class="card"><h3>Portfolio Strategy</h3>${portRows}</div>
      <div class="card full-width"><h3>Estudios activos por mes</h3><div class="col-chart">${colCols}</div></div>
    </div>`;
}

function renderTabla(filtered){
  const rows=filtered.map((d,i)=>`
    <tr>
      <td><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:${MARCA_COLOR[d.marca]||'#6366f1'};flex-shrink:0"></div><strong style="color:#1e293b">${d.marca}</strong></div></td>
      <td>${d.campana}</td>
      <td><span class="badge-tipo">${d.tipo}</span></td>
      <td>${d.plataforma}</td>
      <td>${d.portfolio}</td>
      <td>${badge(d.estado)}</td>
      <td>${d.inicio.slice(0,7)}</td>
      <td>${d.fin.slice(0,7)}</td>
      <td style="font-weight:600;color:${d.presupuesto?'#1e293b':'#cbd5e1'}">${d.presupuesto?'$'+d.presupuesto+'M':'—'}</td>
    </tr>`).join('');
  document.getElementById('panel-tabla').innerHTML=`
    <div class="table-wrap">
      <table>
        <thead><tr><th>Marca</th><th>Campaña</th><th>Tipo</th><th>Plataforma</th><th>Portfolio</th><th>Estado</th><th>Inicio</th><th>Fin</th><th>Presupuesto</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function render(){
  const filtered=getFiltered();
  document.getElementById('f-count').textContent=filtered.length+' estudios';
  if(currentTab==='gantt') renderGantt(filtered);
  else if(currentTab==='resumen') renderResumen();
  else renderTabla(filtered);
}

initFilters();
renderStats();
render();
</script>
</body>
</html>
